<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — CBT System</title>
<link rel="stylesheet" href="/static/shared/style.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
.login-wrap { width: 100%; max-width: 420px; padding: 24px; }
.logo { text-align: center; margin-bottom: 32px; }
.logo-icon { width: 56px; height: 56px; background: var(--primary); border-radius: 14px;
  display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 12px; }
.logo h1 { font-size: 22px; font-weight: 800; }
.logo p { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
.card { padding: 32px; }
.card h2 { font-size: 18px; font-weight: 700; margin-bottom: 24px; }
form { display: flex; flex-direction: column; gap: 16px; }
.student-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">🏫</div>
    <h1>School CBT System</h1>
    <p>Computer-Based Testing Platform</p>
  </div>
  <div class="card">
    <h2>Admin Login</h2>
    <div id="error" class="alert alert-danger" style="display:none"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input class="form-control" name="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Sign In</button>
    </form>
  </div>
  <div class="student-link">
    Are you a student? <a href="/static/student/login.html">Go to Student Portal →</a>
  </div>
</div>
<div id="toast-container"></div>
<script src="/static/shared/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  const err = document.getElementById('error');
  err.style.display = 'none';
  setLoading(btn, true);
  try {
    const fd = new FormData(e.target);
    await api('POST', '/api/admin/login', fd, true);
    window.location.href = '/static/admin/dashboard.html';
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'flex';
    setLoading(btn, false);
  }
});
</script>
</body>
</html>
