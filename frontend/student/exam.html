<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exam — CBT Portal</title>
<link rel="stylesheet" href="/static/shared/style.css">
<style>
* { box-sizing: border-box; }
body { background: var(--bg); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

/* Top bar */
.exam-topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; gap: 12px;
}
.exam-title-bar { font-weight: 700; font-size: 15px; }
.exam-subject-bar { font-size: 12px; color: var(--text-muted); }
.timer-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 16px; text-align: center;
  min-width: 100px; transition: background 0.3s, border-color 0.3s;
}
.timer-box.warning { background: var(--warning-light); border-color: var(--warning); }
.timer-box.danger { background: var(--danger-light); border-color: var(--danger); animation: timerPulse 1s ease infinite; }
@keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.timer-label { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.timer-value { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.timer-box.warning .timer-value { color: var(--warning); }
.timer-box.danger .timer-value { color: var(--danger); }

/* Layout */
.exam-body { display: flex; flex: 1; overflow: hidden; }

/* Nav panel */
.nav-panel {
  width: 220px; background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 16px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 12px;
}
.nav-panel-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
.q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.q-nav-btn {
  aspect-ratio: 1; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-muted);
  font-size: 12px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.q-nav-btn:hover { border-color: var(--primary); color: var(--text); }
.q-nav-btn.answered { background: var(--primary-light); border-color: var(--primary); color: #60a5fa; }
.q-nav-btn.current { background: var(--primary); border-color: var(--primary); color: #fff; }
.nav-legend { display: flex; flex-direction: column; gap: 6px; font-size: 11px; color: var(--text-muted); }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

.submit-btn-wrap { padding-top: 8px; border-top: 1px solid var(--border); }

/* Question area */
.q-area { flex: 1; overflow-y: auto; padding: 32px; }
.q-card { max-width: 760px; margin: 0 auto; }
.q-number { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 16px; }
.q-text { font-size: 18px; font-weight: 600; line-height: 1.6; margin-bottom: 28px; }
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 18px; border-radius: 12px;
  border: 2px solid var(--border); cursor: pointer;
  transition: all 0.15s; background: var(--surface);
}
.option-item:hover { border-color: var(--primary); background: var(--primary-light); }
.option-item.selected { border-color: var(--primary); background: var(--primary-light); }
.option-letter {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; transition: all 0.15s;
}
.option-item.selected .option-letter { background: var(--primary); border-color: var(--primary); color: #fff; }
.option-text { font-size: 15px; line-height: 1.5; padding-top: 3px; }

.q-nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 36px; }
.q-counter { font-size: 13px; color: var(--text-muted); font-weight: 500; }

/* Auto-save indicator */
.save-indicator {
  font-size: 11px; color: var(--text-muted);
  display: flex; align-items: center; gap: 5px;
}
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
.save-dot.saving { background: var(--warning); animation: timerPulse 0.8s infinite; }

/* Mobile responsive */
@media (max-width: 640px) {
  .nav-panel { width: 180px; }
  .q-area { padding: 20px 16px; }
  .q-text { font-size: 16px; }
  .timer-value { font-size: 18px; }
}
</style>
</head>
<body>
<!-- TOP BAR -->
<div class="exam-topbar">
  <div>
    <div class="exam-title-bar" id="examTitle">Loading…</div>
    <div class="exam-subject-bar" id="examSubject"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="save-indicator"><div class="save-dot" id="saveDot"></div><span id="saveText">Saved</span></div>
  </div>
  <div class="timer-box" id="timerBox">
    <div class="timer-label">Time Left</div>
    <div class="timer-value" id="timerDisplay">--:--</div>
  </div>
  <div id="studentNameBar" class="text-sm text-muted"></div>
</div>

<!-- EXAM BODY -->
<div class="exam-body">
  <!-- Navigation Panel -->
  <div class="nav-panel">
    <div class="nav-panel-title">Questions</div>
    <div class="q-grid" id="qNavGrid"></div>
    <div class="nav-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--primary)"></div> Answered</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--surface2);border:1px solid var(--border)"></div> Not answered</div>
    </div>
    <div class="submit-btn-wrap">
      <button class="btn btn-success" style="width:100%" onclick="confirmSubmit()">✓ Submit Exam</button>
    </div>
  </div>

  <!-- Question Area -->
  <div class="q-area" id="qArea">
    <div style="text-align:center;padding:80px;color:var(--text-muted)"><span class="spinner"></span><p style="margin-top:16px">Loading exam…</p></div>
  </div>
</div>

<!-- Submit Confirmation Modal -->
<div class="modal-overlay" id="submitModal">
  <div class="modal" style="max-width:460px">
    <div class="modal-header">
      <span class="modal-title">Submit Exam?</span>
    </div>
    <div class="modal-body">
      <p id="submitSummary" style="font-size:15px;line-height:1.7"></p>
      <div class="alert alert-warning" style="margin-top:8px">
        ⚠ Once submitted, you cannot change your answers.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('submitModal')">Go Back</button>
      <button class="btn btn-success btn-lg" id="confirmSubmitBtn" onclick="doSubmit()">✓ Submit Now</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/shared/app.js"></script>
<script>
const sessionId = new URLSearchParams(location.search).get('session');
if (!sessionId) window.location.href = '/static/student/exams.html';

let session = null;
let questions = [];
let answers = {};
let currentIdx = 0;
let timeRemaining = 0;
let timerInterval = null;
let saveTimeout = null;
let isSaving = false;

async function loadSession() {
  try {
    const me = await api('GET', '/api/student/me');
    document.getElementById('studentNameBar').textContent = me.full_name;
  } catch { window.location.href = '/static/student/login.html'; return; }

  try {
    session = await api('GET', `/api/student/sessions/${sessionId}`);

    if (session.is_submitted) {
      window.location.href = `result.html?session=${sessionId}`;
      return;
    }

    questions = session.questions;
    answers = { ...session.answers };
    timeRemaining = session.time_remaining || (session.duration_minutes * 60);

    document.getElementById('examTitle').textContent = session.exam_title;
    document.getElementById('examSubject').textContent = session.exam_subject || '';

    buildNavGrid();
    showQuestion(0);
    startTimer();
    // Auto-save every 30 seconds
    setInterval(autoSave, 30000);
  } catch (e) {
    toast(e.message, 'error');
  }
}

function buildNavGrid() {
  const grid = document.getElementById('qNavGrid');
  grid.innerHTML = questions.map((q, i) => `
    <button class="q-nav-btn ${answers[q.id] ? 'answered' : ''} ${i === currentIdx ? 'current' : ''}"
            id="nav-${i}" onclick="showQuestion(${i})">${i+1}</button>
  `).join('');
}

function updateNavGrid() {
  questions.forEach((q, i) => {
    const btn = document.getElementById(`nav-${i}`);
    if (btn) {
      btn.className = `q-nav-btn ${answers[q.id] ? 'answered' : ''} ${i === currentIdx ? 'current' : ''}`;
    }
  });
}

function showQuestion(idx) {
  if (idx < 0 || idx >= questions.length) return;
  currentIdx = idx;
  const q = questions[idx];
  const area = document.getElementById('qArea');
  let optionsHtml = '';

  if (q.options) {
    optionsHtml = `<div class="options-list">
      ${Object.entries(q.options).map(([key, val]) => `
        <div class="option-item ${answers[q.id] === key ? 'selected' : ''}"
             onclick="selectAnswer('${q.id}', '${key}')">
          <div class="option-letter">${key}</div>
          <div class="option-text">${val}</div>
        </div>`).join('')}
    </div>`;
  }

  const answeredCount = Object.keys(answers).length;
  area.innerHTML = `<div class="q-card">
    <div class="q-number">Question ${idx+1} of ${questions.length} · <span class="badge badge-muted">${q.marks} mark${q.marks !== 1 ? 's' : ''}</span></div>
    <div class="q-text">${q.question_text}</div>
    ${optionsHtml}
    <div class="q-nav-btns">
      <button class="btn btn-ghost" onclick="showQuestion(${idx-1})" ${idx===0?'disabled':''}>← Previous</button>
      <span class="q-counter">${answeredCount}/${questions.length} answered</span>
      ${idx < questions.length-1
        ? `<button class="btn btn-primary" onclick="showQuestion(${idx+1})">Next →</button>`
        : `<button class="btn btn-success" onclick="confirmSubmit()">Submit Exam ✓</button>`}
    </div>
  </div>`;
  updateNavGrid();
}

function selectAnswer(qid, key) {
  answers[qid] = key;
  showQuestion(currentIdx); // re-render to update selection
  scheduleSave(qid, key);
}

function scheduleSave(qid, key) {
  setSaveStatus('saving');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveAnswer(qid, key), 800);
}

async function saveAnswer(qid, key) {
  try {
    const fd = new FormData();
    fd.append('question_id', qid);
    fd.append('answer', key);
    fd.append('time_remaining', timeRemaining);
    await api('PATCH', `/api/student/sessions/${sessionId}/answer`, fd, true);
    setSaveStatus('saved');
  } catch { setSaveStatus('error'); }
}

async function autoSave() {
  try {
    // Save current answer + time
    const q = questions[currentIdx];
    if (q && answers[q.id]) {
      await saveAnswer(q.id, answers[q.id]);
    }
  } catch {}
}

function setSaveStatus(status) {
  const dot = document.getElementById('saveDot');
  const text = document.getElementById('saveText');
  if (status === 'saving') { dot.className = 'save-dot saving'; text.textContent = 'Saving…'; }
  else if (status === 'saved') { dot.className = 'save-dot'; text.textContent = 'Saved'; }
  else { dot.className = 'save-dot'; dot.style.background = 'var(--danger)'; text.textContent = 'Save failed'; }
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeRemaining--;
    updateTimerDisplay();
    if (timeRemaining <= 0) {
      clearInterval(timerInterval);
      toast('Time is up! Submitting automatically…', 'warning');
      setTimeout(() => doSubmit(true), 1500);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const box = document.getElementById('timerBox');
  document.getElementById('timerDisplay').textContent = fmtTime(Math.max(0, timeRemaining));
  box.className = 'timer-box';
  if (timeRemaining <= 60) box.classList.add('danger');
  else if (timeRemaining <= 300) box.classList.add('warning');
}

function confirmSubmit() {
  const answered = Object.keys(answers).length;
  const unanswered = questions.length - answered;
  document.getElementById('submitSummary').innerHTML =
    `You have answered <strong>${answered}</strong> out of <strong>${questions.length}</strong> questions.<br>` +
    (unanswered > 0 ? `<span style="color:var(--warning)">⚠ ${unanswered} question(s) are unanswered.</span>` : `<span style="color:var(--success)">✓ All questions answered!</span>`);
  openModal('submitModal');
}

async function doSubmit(auto = false) {
  clearInterval(timerInterval);
  const btn = document.getElementById('confirmSubmitBtn');
  if (btn) setLoading(btn, true);
  try {
    const fd = new FormData();
    fd.append('time_remaining', Math.max(0, timeRemaining));
    const result = await api('POST', `/api/student/sessions/${sessionId}/submit`, fd, true);
    closeModal('submitModal');
    window.location.href = `result.html?session=${sessionId}`;
  } catch (e) {
    toast(e.message, 'error');
    if (btn) setLoading(btn, false);
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Prevent accidental navigation
window.addEventListener('beforeunload', (e) => {
  if (session && !session.is_submitted) {
    e.preventDefault();
    e.returnValue = 'Your exam is in progress. Are you sure you want to leave?';
  }
});

loadSession();
</script>
</body>
</html>
